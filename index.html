<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Buy Now Pay Later</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: linear-gradient(135deg, #b8f0c8 0%, #a0d8f0 50%, #90c8f8 100%);
  background-attachment: fixed;
  font-family: 'Segoe UI', sans-serif;
}

body {
  display: flex;
  flex-direction: column;
}

.site-title {
  text-align: center;
  padding: 52px 16px 12px;
  font-size: 24px;
  font-weight: 900;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 2px;
  -webkit-text-stroke: 1.5px #333;
  text-shadow: 2px 2px 0 #333;
  flex-shrink: 0;
}

.card-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 24px 80px;
  position: relative;
}

.card-stack {
  width: 100%;
  max-width: 320px;
  aspect-ratio: 3/4;
  position: relative;
}

.card-stack::before {
  content: '';
  position: absolute;
  inset: 8px -6px -8px 6px;
  background: rgba(255,255,255,0.3);
  border-radius: 26px;
}

.phone-frame {
  position: absolute;
  inset: 0;
  background: #fff;
  border-radius: 24px;
  overflow: hidden;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 32px rgba(0,100,180,0.15);
  cursor: grab;
  touch-action: none;
  z-index: 1;
}
.phone-frame.active { display: flex; }
.phone-frame img {
  width: 85%; height: 85%;
  object-fit: contain;
  pointer-events: none;
}

.label-add {
  position: absolute; top: 22px; left: 16px;
  border: 4px solid #22c55e; color: #22c55e;
  font-size: 22px; font-weight: 900;
  padding: 4px 12px; border-radius: 10px;
  transform: rotate(-20deg); opacity: 0;
  pointer-events: none; z-index: 2;
  text-transform: uppercase; letter-spacing: 2px;
}
.label-skip {
  position: absolute; top: 22px; right: 16px;
  border: 4px solid #ef4444; color: #ef4444;
  font-size: 22px; font-weight: 900;
  padding: 4px 12px; border-radius: 10px;
  transform: rotate(20deg); opacity: 0;
  pointer-events: none; z-index: 2;
  text-transform: uppercase; letter-spacing: 2px;
}

.done-msg {
  display: none;
  position: absolute; inset: 0;
  align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700;
  color: #1a5a8a; text-align: center; line-height: 1.6;
  background: #fff; border-radius: 24px; z-index: 5;
}
.done-msg.active { display: flex; }

.bottom-bar {
  flex-shrink: 0;
  background: rgba(255,255,255,0.95);
  border-top: 1px solid rgba(160,200,240,0.5);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 10px 0 34px;
}

.nav-btn {
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  background: none; border: none;
  cursor: pointer; padding: 4px 16px;
  position: relative;
}
.nav-btn svg {
  width: 26px; height: 26px;
  stroke: #4a9ad4; fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}
.nav-label { font-size: 11px; color: #4a9ad4; font-weight: 600; }

.cart-badge {
  position: absolute; top: -2px; right: 6px;
  background: #e83d3d; color: #fff;
  border-radius: 50%; width: 20px; height: 20px;
  font-size: 11px; font-weight: 800;
  display: none; align-items: center; justify-content: center;
}
@keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }

.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.32); z-index: 200;
  align-items: flex-end; justify-content: center;
}
.overlay.active { display: flex; }

.cart-sheet {
  width: 100%; max-width: 430px;
  background: #fff; border-radius: 28px 28px 0 0;
  padding: 24px 20px 50px;
  animation: slideUp 0.28s ease;
  max-height: 80vh;
  display: flex; flex-direction: column;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.cart-title { font-size: 20px; font-weight: 800; color: #1a3a5c; text-align: center; margin-bottom: 18px; }
.cart-items { flex: 1; overflow-y: auto; }
.cart-item {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 0; border-bottom: 1px solid #e8f0f8;
}
.cart-item:last-of-type { border-bottom: none; }
.cart-item-img {
  width: 58px; height: 58px;
  border-radius: 12px; background: #f0f4f8;
  object-fit: contain; flex-shrink: 0; padding: 4px;
}
.cart-item-name { font-size: 15px; font-weight: 700; color: #1a3a5c; }

.pay-btn {
  margin-top: 18px; width: 100%;
  background: #22c55e; color: #fff;
  border: none; border-radius: 16px;
  padding: 16px; font-size: 18px; font-weight: 900;
  letter-spacing: 1px; cursor: pointer;
}

.delivery-overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  align-items: center; justify-content: center;
}
.delivery-overlay.active {
  display: flex;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(160,220,255,0.2);
}
.delivery-card {
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
  animation: popIn 0.4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(0.3);opacity:0} to{transform:scale(1);opacity:1} }
.delivery-icon { font-size: 80px; }
.delivery-text {
  font-size: 34px; font-weight: 900; color: #fff; letter-spacing: 2px;
  animation: glow 1s ease-in-out infinite alternate;
}
@keyframes glow {
  from { text-shadow: 0 0 20px rgba(100,200,255,0.8); }
  to   { text-shadow: 0 0 40px #fff, 0 0 80px rgba(100,200,255,1); }
}
</style>
</head>
<body>

<div class="site-title">Buy Now Pay Later</div>

<div class="card-area">
  <div class="card-stack">
    <div class="phone-frame active" id="frame0"><img src="phone1.png" alt="iPhone 15 Pro"><div class="label-add" id="lAdd0">ADD</div><div class="label-skip" id="lSkip0">SKIP</div></div>
    <div class="phone-frame"        id="frame1"><img src="phone2.png" alt="iPhone 15"><div class="label-add" id="lAdd1">ADD</div><div class="label-skip" id="lSkip1">SKIP</div></div>
    <div class="phone-frame"        id="frame2"><img src="phone3.png" alt="iPhone 14 Pro"><div class="label-add" id="lAdd2">ADD</div><div class="label-skip" id="lSkip2">SKIP</div></div>
    <div class="phone-frame"        id="frame3"><img src="phone4.png" alt="iPhone 14"><div class="label-add" id="lAdd3">ADD</div><div class="label-skip" id="lSkip3">SKIP</div></div>
    <div class="phone-frame"        id="frame4"><img src="phone5.png" alt="iPhone 13"><div class="label-add" id="lAdd4">ADD</div><div class="label-skip" id="lSkip4">SKIP</div></div>
    <div class="phone-frame"        id="frame5"><img src="phone6.png" alt="iPhone SE"><div class="label-add" id="lAdd5">ADD</div><div class="label-skip" id="lSkip5">SKIP</div></div>
    <div class="done-msg" id="doneMsg"><p>✅ All phones<br>reviewed!<br><br>Check your cart 🛒</p></div>
  </div>
</div>

<div class="bottom-bar">
  <button class="nav-btn" onclick="alert('Settings')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    <span class="nav-label">Settings</span>
  </button>
  <button class="nav-btn" onclick="alert('Search')">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span class="nav-label">Search</span>
  </button>
  <button class="nav-btn" onclick="openCart()">
    <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    <span class="cart-badge" id="cartBadge">0</span>
    <span class="nav-label">Cart</span>
  </button>
</div>

<div class="overlay" id="cartOverlay">
  <div class="cart-sheet">
    <div class="cart-title">🛒 Your Cart</div>
    <div class="cart-items" id="cartItems"></div>
    <button class="pay-btn" onclick="onPayLater()">PAY LATER</button>
  </div>
</div>

<div class="delivery-overlay" id="deliveryOverlay">
  <div class="delivery-card">
    <div class="delivery-icon">🚗</div>
    <div class="delivery-text">Delivering...</div>
  </div>
</div>

<script>
var phones = [
  { name:'iPhone 15 Pro', src:'phone1.png' },
  { name:'iPhone 15',     src:'phone2.png' },
  { name:'iPhone 14 Pro', src:'phone3.png' },
  { name:'iPhone 14',     src:'phone4.png' },
  { name:'iPhone 13',     src:'phone5.png' },
  { name:'iPhone SE',     src:'phone6.png' }
];

var idx=0, cart=[], dragging=false, startX=0, curX=0, tapped=false;

function frame(i)  { return document.getElementById('frame'+i); }
function lAdd(i)   { return document.getElementById('lAdd'+i);  }
function lSkip(i)  { return document.getElementById('lSkip'+i); }

var badge  = document.getElementById('cartBadge');
var doneEl = document.getElementById('doneMsg');

for(var i=0;i<6;i++){
  (function(n){
    var f=frame(n);
    f.addEventListener('touchstart',function(e){ if(n!==idx)return; dragging=true;tapped=true;startX=e.touches[0].clientX;curX=0;f.style.transition='none'; },{passive:true});
    f.addEventListener('mousedown', function(e){ if(n!==idx)return; dragging=true;tapped=true;startX=e.clientX;curX=0;f.style.transition='none'; });
  })(i);
}

window.addEventListener('touchmove',function(e){ if(!dragging)return; curX=e.touches[0].clientX-startX; if(Math.abs(curX)>8)tapped=false; drag(); },{passive:true});
window.addEventListener('mousemove', function(e){ if(!dragging)return; curX=e.clientX-startX; if(Math.abs(curX)>8)tapped=false; drag(); });
window.addEventListener('touchend', finish);
window.addEventListener('mouseup',  finish);

function drag(){
  var f=frame(idx);
  f.style.transform='translateX('+curX+'px) rotate('+(curX*0.07)+'deg)';
  var r=Math.min(Math.abs(curX)/90,1);
  lAdd(idx).style.opacity=curX>0?r:0;
  lSkip(idx).style.opacity=curX<0?r:0;
}

function finish(){
  if(!dragging)return; dragging=false;
  if(tapped&&Math.abs(curX)<8){ addCurrent(); return; }
  if(curX<-80) animateOut('left',false);
  else if(curX>80) addCurrent();
  else { var f=frame(idx); f.style.transition='transform 0.3s'; f.style.transform='none'; lAdd(idx).style.opacity=0; lSkip(idx).style.opacity=0; }
  curX=0;
}

function addCurrent(){ cart.push({name:phones[idx].name,src:phones[idx].src}); updateBadge(); animateOut('right',true); }

function animateOut(dir,added){
  var f=frame(idx);
  f.style.transition='transform 0.38s ease, opacity 0.38s ease';
  f.style.transform=dir==='right'?'translateX(140%) rotate(25deg)':'translateX(-140%) rotate(-25deg)';
  f.style.opacity='0';
  lAdd(idx).style.opacity=added?1:0;
  lSkip(idx).style.opacity=added?0:1;
  setTimeout(function(){
    f.classList.remove('active'); f.style.transform='none'; f.style.opacity='1';
    lAdd(idx).style.opacity=0; lSkip(idx).style.opacity=0;
    idx++;
    if(idx<phones.length) frame(idx).classList.add('active');
    else doneEl.classList.add('active');
  },380);
}

function updateBadge(){
  var n=cart.length;
  badge.style.display=n>0?'flex':'none'; badge.textContent=n;
  badge.style.animation='none'; badge.offsetHeight; badge.style.animation='pop 0.3s cubic-bezier(.34,1.56,.64,1)';
}

function openCart(){
  var list=document.getElementById('cartItems'); list.innerHTML='';
  if(!cart.length){ list.innerHTML='<p style="text-align:center;color:#aac;padding:20px 0">Cart is empty</p>'; }
  else { cart.forEach(function(item){ var row=document.createElement('div'); row.className='cart-item'; var img=document.createElement('img'); img.className='cart-item-img'; img.src=item.src; img.alt=item.name; var nm=document.createElement('span'); nm.className='cart-item-name'; nm.textContent=item.name; row.appendChild(img); row.appendChild(nm); list.appendChild(row); }); }
  document.getElementById('cartOverlay').classList.add('active');
}

function onPayLater(){
  document.getElementById('cartOverlay').classList.remove('active');
  document.getElementById('deliveryOverlay').classList.add('active');
  setTimeout(function(){ document.getElementById('deliveryOverlay').classList.remove('active'); cart=[]; updateBadge(); },4000);
}

document.getElementById('cartOverlay').addEventListener('click',function(e){ if(e.target===this)this.classList.remove('active'); });
document.getElementById('deliveryOverlay').addEventListener('click',function(){ this.classList.remove('active'); });
</script>
</body>
</html>
